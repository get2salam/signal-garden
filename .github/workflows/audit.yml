name: board-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit SPEC invariants and seed priority
        run: node tools/audit-board.mjs
      - name: Run audit test suite
        run: node --test tools/*.test.mjs
